<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXOS MVP Interactive Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh thanh cuộn cho khu vực note */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        /* Tooltip custom */
        .tooltip-content { display: none; }
        .has-tooltip:hover .tooltip-content { display: block; }
        /* Meeting badge animation */
        @keyframes pulse-meet {
            0%, 100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(234, 67, 53, 0); }
        }
        .meet-pulse { animation: pulse-meet 2s infinite; }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-200 font-sans selection:bg-cyan-500/30 pb-24 relative overflow-x-hidden">

    <!-- Language Toggle Button -->
    <div class="fixed top-4 right-4 md:top-6 md:right-6 z-50">
        <button id="lang-toggle" onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-full text-sm font-bold border border-slate-600 transition-all shadow-lg flex items-center gap-2">
            <span id="lang-icon">🇻🇳</span>
            <span id="lang-label">VI</span>
        </button>
    </div>

    <!-- Meeting Button (Fixed) -->
    <div class="fixed bottom-6 right-6 z-50">
        <button onclick="openMeetingModal()" class="bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-400 hover:to-orange-400 text-white px-5 py-3 rounded-full text-sm font-bold shadow-lg transition-all flex items-center gap-2 meet-pulse">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span id="i18n-meeting-btn">Tạo cuộc họp</span>
        </button>
    </div>

    <!-- Header -->
    <header class="pt-16 pb-6 px-6 text-center max-w-4xl mx-auto relative z-20">
        <div class="inline-flex items-center justify-center space-x-2 bg-slate-900 border border-slate-800 px-4 py-1.5 rounded-full mb-6">
            <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="text-sm font-medium tracking-wide text-cyan-400 uppercase" id="i18n-subtitle">NEXOS Strategic Plan</span>
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-white">
            <span id="i18n-title-prefix">Lộ Trình MVP</span> <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">Trust OS</span>
        </h1>
        <p class="text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed mb-6" id="i18n-desc">
            Không gian làm việc tương tác. Quản lý trạng thái, tài liệu và trao đổi trực tiếp trên từng Deliverable.
        </p>
    </header>

    <!-- Metro Map Section with Timeline -->
    <section class="py-16 px-4 md:px-12 w-full max-w-6xl mx-auto relative">
        <div class="relative md:pb-16">
            <!-- Background Timeline Line -->
            <div class="absolute z-0 w-1 md:h-2 bg-slate-800 rounded-full left-[156px] top-[28px] bottom-[28px] md:left-[96px] md:right-[96px] md:w-auto md:top-auto md:bottom-0">
                
                <!-- Milestone Markers -->
                <div class="absolute w-3 h-3 rounded-full bg-slate-700 z-10 timeline-marker transition-colors duration-500 left-1/2 md:left-[0%] top-[0%] md:top-1/2 -translate-x-1/2 -translate-y-1/2" data-pct="0"></div>
                <div class="absolute w-3 h-3 rounded-full bg-slate-700 z-10 timeline-marker transition-colors duration-500 left-1/2 md:left-[25%] top-[25%] md:top-1/2 -translate-x-1/2 -translate-y-1/2" data-pct="25"></div>
                <div class="absolute w-3 h-3 rounded-full bg-slate-700 z-10 timeline-marker transition-colors duration-500 left-1/2 md:left-[50%] top-[50%] md:top-1/2 -translate-x-1/2 -translate-y-1/2" data-pct="50"></div>
                <div class="absolute w-3 h-3 rounded-full bg-slate-700 z-10 timeline-marker transition-colors duration-500 left-1/2 md:left-[75%] top-[75%] md:top-1/2 -translate-x-1/2 -translate-y-1/2" data-pct="75"></div>
                <div class="absolute w-3 h-3 rounded-full bg-slate-700 z-10 timeline-marker transition-colors duration-500 left-1/2 md:left-[100%] top-[100%] md:top-1/2 -translate-x-1/2 -translate-y-1/2" data-pct="100"></div>

                <!-- Progress Line -->
                <div id="timeline-progress" class="bg-cyan-500 rounded-full w-full h-0 md:w-0 md:h-full transition-all duration-1000 shadow-[0_0_10px_rgba(6,182,212,0.5)]"></div>
                
                <!-- Current Date Indicator -->
                <div id="current-date-marker" class="absolute w-4 h-4 bg-white border-4 border-cyan-500 rounded-full shadow-lg z-20 transition-all duration-1000 group" style="transform: translate(-50%, -50%);">
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-cyan-600 text-white text-xs font-bold py-1 px-3 rounded whitespace-nowrap hidden md:block">
                        <span id="i18n-today">Hôm nay</span>: <span id="today-text"></span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-cyan-600"></div>
                    </div>
                    <!-- Mobile view tooltip -->
                    <div class="absolute left-full top-1/2 -translate-y-1/2 ml-2 bg-cyan-600 text-white text-xs font-bold py-1 px-3 rounded whitespace-nowrap block md:hidden">
                        <span id="i18n-today-mobile">Hôm nay</span>: <span id="today-text-mobile"></span>
                        <div class="absolute top-1/2 right-full -translate-y-1/2 border-4 border-transparent border-l-cyan-600"></div>
                    </div>
                </div>
            </div>

            <!-- Nodes Container -->
            <div id="nodes-container" class="relative z-10 flex flex-col space-y-20 md:flex-row md:justify-between md:items-start md:space-y-0">
                <!-- Rendered via JS -->
            </div>
        </div>
    </section>

    <!-- Details Dashboard Area -->
    <section class="pb-24 px-4 md:px-6 w-full max-w-6xl mx-auto">
        <div class="bg-slate-900/80 border border-slate-800 rounded-3xl p-6 md:p-10 backdrop-blur-md shadow-2xl transition-all duration-500">
            
            <div class="mb-8 border-b border-slate-800 pb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <p id="detail-date" class="text-cyan-400 font-mono text-sm mb-2"></p>
                    <h2 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                        <svg class="text-slate-500 w-8 h-8 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M12 3v6M12 15v6M3 12h6M15 12h6"></path></svg>
                        <span id="detail-title"></span>
                    </h2>
                </div>
                <div id="detail-badge" class="px-4 py-2 rounded-lg text-sm font-semibold text-white shadow-lg inline-block w-max"></div>
            </div>

            <!-- 3 Columns Layout -->
            <div class="grid md:grid-cols-12 gap-8">
                <!-- Task Column (Span 4) -->
                <div class="md:col-span-4 space-y-5">
                    <div class="flex items-center gap-3 text-slate-300 border-b border-slate-800 pb-3">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                        <h3 class="text-lg font-bold text-blue-400" id="i18n-col-task">Task</h3>
                    </div>
                    <ul id="task-list" class="space-y-4"></ul>
                </div>

                <!-- Tool Column (Span 3) -->
                <div class="md:col-span-3 space-y-5 relative md:before:absolute md:before:inset-y-0 md:before:-left-4 md:before:w-px md:before:bg-gradient-to-b md:before:from-slate-800 md:before:to-transparent">
                    <div class="flex items-center gap-3 text-slate-300 border-b border-slate-800 pb-3">
                        <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                        <h3 class="text-lg font-bold text-amber-400" id="i18n-col-tool">Tool</h3>
                    </div>
                    <ul id="tool-list" class="space-y-4"></ul>
                </div>
                
                <!-- Deliverable Column (Span 5 - Wider for interactability) -->
                <div class="md:col-span-5 space-y-5 relative md:before:absolute md:before:inset-y-0 md:before:-left-4 md:before:w-px md:before:bg-gradient-to-b md:before:from-slate-800 md:before:to-transparent">
                    <div class="flex items-center justify-between text-slate-300 border-b border-slate-800 pb-3">
                        <div class="flex items-center gap-3">
                            <svg class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                            <h3 class="text-lg font-bold text-teal-400" id="i18n-col-deliverable">Deliverable</h3>
                        </div>
                    </div>
                    <ul id="deliverable-list" class="space-y-4">
                        <!-- Rendered via JS -->
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <!-- Upcoming Meetings Section -->
    <section class="pb-24 px-4 md:px-6 w-full max-w-6xl mx-auto">
        <div class="bg-slate-900/60 border border-slate-800 rounded-3xl p-6 md:p-8 backdrop-blur-md">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="i18n-meetings-title">Cuộc họp sắp tới</span>
                </h3>
            </div>
            <div id="meetings-list" class="space-y-3">
                <!-- Rendered via JS -->
            </div>
        </div>
    </section>

    <!-- Note Modal -->
    <div id="note-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-md shadow-2xl transform scale-95 transition-transform" id="note-modal-content">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h4 class="font-bold text-white" id="i18n-note-title">Thêm Ghi chú</h4>
                <button onclick="closeNoteModal()" class="text-slate-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-4">
                <textarea id="note-input" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-cyan-500 h-24 resize-none" placeholder="Nhập nội dung trao đổi..."></textarea>
            </div>
            <div class="p-4 border-t border-slate-700 flex justify-end gap-3">
                <button onclick="closeNoteModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800" id="i18n-cancel">Hủy</button>
                <button id="save-note-btn" class="px-4 py-2 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-500" id="i18n-save-note">Lưu ghi chú</button>
            </div>
        </div>
    </div>

    <!-- Meeting Modal -->
    <div id="meeting-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-lg shadow-2xl transform scale-95 transition-transform" id="meeting-modal-content">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h4 class="font-bold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <span id="i18n-meeting-modal-title">Tạo cuộc họp mới</span>
                </h4>
                <button onclick="closeMeetingModal()" class="text-slate-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1" id="i18n-meeting-title-label">Tiêu đề</label>
                    <input type="text" id="meeting-title" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-cyan-500" placeholder="VD: Họp Demo với Investor A">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1" id="i18n-meeting-date-label">Ngày</label>
                        <input type="date" id="meeting-date" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1" id="i18n-meeting-time-label">Giờ</label>
                        <input type="time" id="meeting-time" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-cyan-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1" id="i18n-meeting-duration-label">Thời lượng</label>
                    <select id="meeting-duration" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-cyan-500">
                        <option value="30">30 phút</option>
                        <option value="60" selected>1 giờ</option>
                        <option value="90">1.5 giờ</option>
                        <option value="120">2 giờ</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1" id="i18n-meeting-type-label">Hình thức</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="meeting-type" value="online" checked class="accent-red-500">
                            <span class="text-sm text-slate-300" id="i18n-meeting-online">Online (Google Meet)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="meeting-type" value="offline" class="accent-cyan-500">
                            <span class="text-sm text-slate-300" id="i18n-meeting-offline">Offline</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1" id="i18n-meeting-participants-label">Thành phần tham gia</label>
                    <input type="text" id="meeting-participants" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-cyan-500" placeholder="VD: Investor A, Team NEXOS">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1" id="i18n-meeting-notes-label">Ghi chú</label>
                    <textarea id="meeting-notes" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-cyan-500 h-16 resize-none" placeholder="Agenda, ghi chú..."></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-slate-700 flex justify-end gap-3">
                <button onclick="closeMeetingModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800" id="i18n-cancel-2">Hủy</button>
                <button id="save-meeting-btn" onclick="saveMeeting()" class="px-4 py-2 rounded-lg text-sm font-bold bg-gradient-to-r from-red-500 to-orange-500 text-white hover:from-red-400 hover:to-orange-400 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="i18n-create-meeting">Tạo cuộc họp</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const API_URL = 'https://script.google.com/macros/s/AKfycbxcObrb-TpaTHYyOW35R2EOH9yeJNUR7WQ5OZ8VoBjDQ5IQwtz8I1xi2ERhewJHmRDo/exec';

        const itBadge = (tooltipText) => `

        // ==================== STATUSES ====================

        // ==================== TIMELINE LOGIC ====================
        function calculateTimelineProgress() {
            const year = new Date().getFullYear();
            const milestones = [
                new Date(year, 2, 16).getTime(),
                new Date(year, 2, 26).getTime(),
                new Date(year, 3, 6).getTime(),
                new Date(year, 3, 16).getTime(),
                new Date(year, 3, 24).getTime(),
                new Date(year, 3, 31).getTime()
            ];
            
            const now = new Date();
            const todayTime = now.getTime();
            let percentage = 0;

            if (todayTime <= milestones[0]) {
                percentage = 0;
            } else if (todayTime >= milestones[4]) {
                percentage = 100;
            } else {
                for (let i = 0; i < 4; i++) {
                    if (todayTime >= milestones[i] && todayTime < milestones[i+1]) {
                        const segmentDuration = milestones[i+1] - milestones[i];
                        const passed = todayTime - milestones[i];
                        const segmentProgress = passed / segmentDuration;
                        percentage = (i * 25) + (segmentProgress * 25);
                        break;
                    }
                }
            }

            const progressBar = document.getElementById('timeline-progress');
            const marker = document.getElementById('current-date-marker');
            const isMobile = window.innerWidth < 768;

            if (isMobile) {
                progressBar.style.height = `${percentage}%`;
                progressBar.style.width = '100%';
                marker.style.top = `${percentage}%`;
                marker.style.left = '50%';
            } else {
                progressBar.style.width = `${percentage}%`;
                progressBar.style.height = '100%';
                marker.style.left = `${percentage}%`;
                marker.style.top = '50%';
            }

            const dateStr = now.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            document.getElementById('today-text').innerHTML = dateStr;
            const mobileText = document.getElementById('today-text-mobile');
            if (mobileText) mobileText.innerHTML = dateStr;

            document.querySelectorAll('.timeline-marker').forEach(marker => {
                const markerPct = parseInt(marker.getAttribute('data-pct'));
                if (percentage >= markerPct) {
                    marker.classList.remove('bg-slate-700');
                    marker.classList.add('bg-cyan-500');
                } else {
                    marker.classList.add('bg-slate-700');
                    marker.classList.remove('bg-cyan-500');
                }
            });
        }

        window.addEventListener('resize', calculateTimelineProgress);

                document.querySelectorAll('[id^="note-panel-"]').forEach(el => el.classList.add('hidden'));
                panel.classList.remove('hidden');
            } else {
                panel.classList.add('hidden');
            }
        }

        // ==================== NOTE MODAL ====================
        const modal = document.getElementById('note-modal');
        const modalContent = document.getElementById('note-modal-content');
        const noteInput = document.getElementById('note-input');

        function openNoteModal(sprintIndex, delivIndex) {
            activeDelivForNote = { sprintIndex, delivIndex };
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
            noteInput.value = '';
            noteInput.focus();
        }

        function closeNoteModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                activeDelivForNote = null;
            }, 300);
        }

        document.getElementById('save-note-btn').addEventListener('click', () => {
            const content = noteInput.value.trim();
            if(content && activeDelivForNote) {
                const { sprintIndex, delivIndex } = activeDelivForNote;
                sprintsData[sprintIndex].deliverables[delivIndex].notes.push({
                    content: content,
                    is_resolved: false,
                    date: new Date().toISOString()
                });
                saveState();
                syncToServer();
                renderDeliverablesList(sprintIndex);
                document.getElementById(`note-panel-${sprintIndex}-${delivIndex}`).classList.remove('hidden');
                closeNoteModal();
            }
        });

        function resolveNote(sprintIndex, delivIndex, noteIndex) {
            sprintsData[sprintIndex].deliverables[delivIndex].notes[noteIndex].is_resolved = true;
            saveState();
            syncToServer();
            renderDeliverablesList(sprintIndex);
            document.getElementById(`note-panel-${sprintIndex}-${delivIndex}`).classList.remove('hidden');
        }

        // ==================== MEETING MODAL ====================
        const meetingModal = document.getElementById('meeting-modal');
        const meetingModalContent = document.getElementById('meeting-modal-content');

        function openMeetingModal(meetingToEdit = null) {
            editingMeetingId = meetingToEdit ? meetingToEdit.id : null;
            
            if (meetingToEdit) {
                document.getElementById('meeting-title').value = meetingToEdit.title || '';
                document.getElementById('meeting-date').value = meetingToEdit.date || '';
                document.getElementById('meeting-time').value = meetingToEdit.time || '';
                document.getElementById('meeting-duration').value = meetingToEdit.duration || '60';
                document.querySelector(`input[name="meeting-type"][value="${meetingToEdit.type || 'online'}"]`).checked = true;
                document.getElementById('meeting-participants').value = meetingToEdit.participants || '';
                document.getElementById('meeting-notes').value = meetingToEdit.notes || '';
            } else {
                document.getElementById('meeting-title').value = '';
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('meeting-date').value = today;
                document.getElementById('meeting-time').value = '09:00';
                document.getElementById('meeting-duration').value = '60';
                document.querySelector('input[name="meeting-type"][value="online"]').checked = true;
                document.getElementById('meeting-participants').value = '';
                document.getElementById('meeting-notes').value = '';
            }
            
            meetingModal.classList.remove('hidden');
            setTimeout(() => {
                meetingModal.classList.remove('opacity-0');
                meetingModalContent.classList.remove('scale-95');
                meetingModalContent.classList.add('scale-100');
            }, 10);
            document.getElementById('meeting-title').focus();
        }

        function closeMeetingModal() {
            meetingModal.classList.add('opacity-0');
            meetingModalContent.classList.remove('scale-100');
            meetingModalContent.classList.add('scale-95');
            setTimeout(() => {
                meetingModal.classList.add('hidden');
                editingMeetingId = null;
            }, 300);
        }

        function saveMeeting() {
            const title = document.getElementById('meeting-title').value.trim();
            const date = document.getElementById('meeting-date').value;
            const time = document.getElementById('meeting-time').value;
            const duration = document.getElementById('meeting-duration').value;
            const type = document.querySelector('input[name="meeting-type"]:checked').value;
            const participants = document.getElementById('meeting-participants').value.trim();
            const notes = document.getElementById('meeting-notes').value.trim();

            if (!title || !date || !time) {
                alert(currentLang === 'vi' ? 'Vui lòng điền đầy đủ tiêu đề, ngày và giờ!' : 'Please fill in title, date and time!');
                return;
            }

            if (editingMeetingId) {
                // Edit existing meeting
                const idx = meetingsData.findIndex(m => m.id === editingMeetingId);
                if (idx !== -1) {
                    meetingsData[idx] = {
                        ...meetingsData[idx],
                        title, date, time, duration, type, participants, notes,
                        updatedAt: new Date().toISOString()
                    };
                }
            } else {
                // Create new meeting
                const meeting = {
                    id: 'meet_' + Date.now(),
                    title, date, time, duration, type, participants, notes,
                    meetLink: type === 'online' ? generateGoogleMeetLink(title, date, time) : null,
                    createdAt: new Date().toISOString()
                };
                meetingsData.push(meeting);
            }

            saveState();
            syncMeetingsToServer();
            renderMeetings();
            closeMeetingModal();
        }

        function deleteMeeting(meetingId) {
            if (confirm(currentLang === 'vi' ? 'Bạn có chắc muốn xóa cuộc họp này?' : 'Are you sure you want to delete this meeting?')) {
                meetingsData = meetingsData.filter(m => m.id !== meetingId);
                saveState();
                syncMeetingsToServer();
                renderMeetings();
            }
        }

        function generateGoogleMeetLink(title, date, time) {
            // Generate Google Calendar link with Meet
            const startDate = new Date(`${date}T${time}`);
            const endDate = new Date(startDate.getTime() + parseInt(document.getElementById('meeting-duration').value) * 60000);
            
            const formatDate = (d) => d.toISOString().replace(/-|:|\.\d\d\d/g, '');
            
            const googleCalUrl = new URL('https://calendar.google.com/calendar/render');
            googleCalUrl.searchParams.set('action', 'TEMPLATE');
            googleCalUrl.searchParams.set('text', title);
            googleCalUrl.searchParams.set('dates', `${formatDate(startDate)}/${formatDate(endDate)}`);
            googleCalUrl.searchParams.set('add', 'meet.google.com');
            
            return googleCalUrl.toString();
        }

        function renderMeetings() {
            const container = document.getElementById('meetings-list');
            const t = translations[currentLang];
            
            if (meetingsData.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-sm italic">${t.noMeetings}</p>`;
                return;
            }

            // Sort by date/time
            const sortedMeetings = [...meetingsData].sort((a, b) => {
                const dateA = new Date(`${a.date}T${a.time}`);
                const dateB = new Date(`${b.date}T${b.time}`);
                return dateA - dateB;
            });

            container.innerHTML = sortedMeetings.map(meeting => {
                const meetingDate = new Date(`${meeting.date}T${meeting.time}`);
                const formattedDate = meetingDate.toLocaleDateString(currentLang === 'vi' ? 'vi-VN' : 'en-US', { 
                    weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' 
                });
                const formattedTime = meetingTime = meeting.time;
                const durationText = meeting.duration >= 60 
                    ? `${meeting.duration / 60} ${t.hour}` 
                    : `${meeting.duration} ${t.minutes}`;

                return `
                    <div class="bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 hover:bg-slate-800 transition-colors">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-3">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <h4 class="font-bold text-white">${meeting.title}</h4>
                                    <span class="px-2 py-0.5 rounded text-xs font-medium ${meeting.type === 'online' ? 'bg-red-500/20 text-red-400' : 'bg-cyan-500/20 text-cyan-400'}">
                                        ${meeting.type === 'online' ? 'Google Meet' : 'Offline'}
                                    </span>
                                </div>
                                <div class="flex flex-wrap gap-3 text-sm text-slate-400">
                                    <span class="flex items-center gap-1">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                        ${formattedDate}
                                    </span>
                                    <span class="flex items-center gap-1">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        ${formattedTime} (${durationText})
                                    </span>
                                    ${meeting.participants ? `
                                        <span class="flex items-center gap-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                            ${meeting.participants}
                                        </span>
                                    ` : ''}
                                </div>
                                ${meeting.notes ? `<p class="text-xs text-slate-500 mt-2">${meeting.notes}</p>` : ''}
                            </div>
                            <div class="flex items-center gap-2">
                                ${meeting.type === 'online' ? `
                                    <a href="${meeting.meetLink || '#'}" target="_blank" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-red-500 hover:bg-red-400 text-white flex items-center gap-1">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                        ${t.viewMeet}
                                    </a>
                                ` : ''}
                                <button onclick="openMeetingModal(${JSON.stringify(meeting).replace(/"/g, '&quot;')})" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-700 hover:bg-slate-600 text-slate-300">
                                    ${t.editMeeting}
                                </button>
                                <button onclick="deleteMeeting('${meeting.id}')" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-700 hover:bg-red-500/50 text-slate-300 hover:text-white">
                                    ${t.deleteMeeting}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== STATE MANAGEMENT ====================
        function loadState() {
            const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed.sprints) {
                    parsed.sprints.forEach((savedSprint, sIdx) => {
                        if (sprintsData[sIdx] && savedSprint.deliverables) {
                            sprintsData[sIdx].deliverables = savedSprint.deliverables;
                        }
                    });
                }
                if (parsed.meetings) {
                    meetingsData = parsed.meetings;
                }
            }
        }

        function saveState() {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify({
                sprints: sprintsData,
                meetings: meetingsData
            }));
        }

        // ==================== API SYNC ====================
        async function syncToServer() {
            if (!isOnline) return;
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateAll',
                        data: sprintsData
                    })
                });
            } catch (error) {
                console.log('Sync error:', error);
            }
        }

        async function syncMeetingsToServer() {
            if (!isOnline) return;
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateMeetings',
                        meetings: meetingsData
                    })
                });
            } catch (error) {
                console.log('Sync meetings error:', error);
            }
        }

        async function loadFromServer() {
            if (!isOnline) return;
            try {
                const response = await fetch(`${API_URL}?action=getAll`);
                const data = await response.json();
                if (data.success) {
                    if (data.sprints) {
                        data.sprints.forEach((serverSprint, sIdx) => {
                            if (sprintsData[sIdx] && serverSprint.deliverables) {
                                sprintsData[sIdx].deliverables = serverSprint.deliverables;
                            }
                        });
                    }
                    if (data.meetings) {
                        meetingsData = data.meetings;
                    }
                    saveState();
                }
            } catch (error) {
                console.log('Load from server error:', error);
            }
        }

        // ==================== INITIALIZATION ====================
        sprintsData = JSON.parse(JSON.stringify(baseSprintsData));
        loadState();
        updateStaticTranslations();
        renderNodes();
        updateDashboard(0);
        renderMeetings();
        setTimeout(calculateTimelineProgress, 100);

        // Load from server on start
        loadFromServer().then(() => {
            renderNodes();
            updateDashboard(activeNodeIndex);
            renderMeetings();
        });

        // Periodic sync
        setInterval(() => {
            loadFromServer();
        }, 30000);
    </script>
</body>
</html>
